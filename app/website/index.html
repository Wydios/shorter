<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wydios • Shorter</title>

    <meta name="description" content="Wydios Shorter - Safe and Simple URL Shortener :)">
    <meta name="robots" content="index, follow">
    <link rel="icon" href="assets/images/favicon.ico">

    <meta property="og:title" content="Wydios • Shorter">
    <meta property="og:description" content="Safe and Simple URL Shortener :)">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://s.wydios.de">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Wydios • Shorter">
    <meta name="twitter:description" content="Safe and Simple URL Shortener :)">

    <link rel="stylesheet" href="assets/style.css">
</head>
<body>
    <nav class="topbar">
        <a href="/" class="logo">
            <img src="assets/images/favicon.ico">
        </a>

        <div class="nav">
            <a 
                href="https://wydios.de" 
                class="nav-link nav-underline"
            >
                Back to Main Site
            </a>
        </div>
    </nav>

    <main class="container">
        <section class="card" id="login">
            <h1>Wydios Shorter</h1>
        
            <p class="subtitle">
                Safe and Simple URL Shortener
            </p>
        
            <input 
                id="username"
                type="text"
                placeholder="Username"
            >

            <input 
                id="password"
                type="password"
                placeholder="Password"
            >
        
            <button onclick="login()">
                Login
            </button>
        
            <p class="info">
                Don't have an account?<br>
                Ask 
                <a href="https://twitch.tv/wydios" target="_blank">
                    Wydios
                </a>
                to get access.
            </p>
        </section>

        <section class="card hidden" id="dashboard">
            <h1>
                👋 Hello <span id="displayName">User</span>
            </h1>

            <p class="subtitle">
                What are we shortening today? ✂️
            </p>

            <div class="box">
                <h2>🔗 - Create Short</h2>

                <input id="url" type="text" placeholder="https://example.com">

                <button onclick="createShort()">
                    Create Short
                </button>
            </div>

            <div class="divider"></div>

            <div class="box">
                <h2>📚 - Your Shorts</h2>

                <div id="shortList">
                </div>
            </div>
        </section>
    </main>
    <footer>
        <div class="divider"></div>
        
        © 2026 <a href="https://wydios.de">wydios.de</a> • Developed with 💙 by Wydios
    </footer>
    <script src="assets/script.js"></script>
</body>
</html>
